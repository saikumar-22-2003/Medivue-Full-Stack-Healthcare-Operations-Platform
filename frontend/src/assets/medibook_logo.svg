<svg xmlns="http://www.w3.org/2000/svg" width="220" height="50" viewBox="0 0 220 50">

  <!-- Icon background rounded square -->
  <rect x="0" y="0" width="44" height="44" rx="10" fill="url(#iconGrad)"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5f6fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b4fd8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book shape inside icon -->
  <rect x="10" y="10" width="18" height="24" rx="2" fill="white" opacity="0.3"/>
  <rect x="10" y="10" width="3" height="24" rx="1" fill="white" opacity="0.5"/>
  <rect x="13" y="12" width="13" height="20" rx="1" fill="white" opacity="0.9"/>

  <!-- Medical cross on book -->
  <rect x="16" y="18" width="7" height="2.5" rx="1" fill="#3b4fd8"/>
  <rect x="18.5" y="15.5" width="2.5" height="7" rx="1" fill="#3b4fd8"/>

  <!-- Small dot like Medivue star -->
  <circle cx="34" cy="10" r="4" fill="white" opacity="0.95"/>
  <circle cx="34" cy="10" r="2" fill="#5f6fff"/>

  <!-- MediBook text -->
  <text x="52" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1a237e">Medi</text>
  <text x="114" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#5f6fff">Book</text>

</svg>
